<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        var a = ["xyz", "pqr", "mno"]

        function firstlast(p) {
            var o = {}
            o[p[0]] = p[p.length - 1]
            return o;
        }
        document.writeln(JSON.stringify(firstlast(a)))
    </script>
</body>

</html>
